<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech + Redirect - Firefox Support</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
  }
  
  h2 {
    margin-bottom: 30px;
    font-size: 1.8rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  
  button {
    padding: 18px 35px;
    font-size: 18px;
    cursor: pointer;
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    font-weight: bold;
  }
  
  button:hover {
    background: #ff5252;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  
  button:active {
    transform: translateY(0);
  }
  
  .status {
    margin-top: 20px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  
  .status.show {
    opacity: 1;
  }
  
  .fallback-msg {
    margin-top: 15px;
    font-size: 14px;
    color: #ffeaa7;
    font-style: italic;
  }
</style>
</head>
<body>

<h2>🔊 Klik untuk Buka Google</h2>
<button id="speechBtn">📞 CALL CENTER GOOGLE</button>
<div id="status" class="status">🎙️ Memainkan suara...</div>
<div id="fallback" class="fallback-msg"></div>

<script>
const btn = document.getElementById('speechBtn');
const statusDiv = document.getElementById('status');
const fallbackDiv = document.getElementById('fallback');

// Pesan yang akan dibacakan
const text = "Hello, google.com is still experiencing an error or maintenance. Please visit the support center or call our call center at plus five two";

// Fungsi untuk menunggu voices tersedia (khusus Firefox)
function waitForVoices() {
  return new Promise((resolve) => {
    let voices = speechSynthesis.getVoices();
    
    if (voices.length > 0) {
      resolve(voices);
    } else {
      // Firefox butuh event voiceschanged
      speechSynthesis.onvoiceschanged = () => {
        voices = speechSynthesis.getVoices();
        resolve(voices);
      };
      
      // Fallback timeout 1 detik jika event tidak fire
      setTimeout(() => {
        if (speechSynthesis.getVoices().length === 0) {
          resolve([]); // Return empty array
        }
      }, 1000);
    }
  });
}

// Fungsi utama text-to-speech
async function playSpeech() {
  // Cek support TTS
  if (!('speechSynthesis' in window)) {
    console.log('TTS tidak didukung');
    return false;
  }

  try {
    // Tunggu voices (penting untuk Firefox)
    const voices = await waitForVoices();
    
    const utter = new SpeechSynthesisUtterance(text);
    
    // Setting bahasa
    utter.lang = 'en-US';
    utter.rate = 0.9;  // Sedikit lebih lambat agar jelas
    utter.pitch = 1;
    
    // Cari suara Inggris yang tersedia
    if (voices.length > 0) {
      const enVoice = voices.find(v => 
        v.lang && (v.lang.startsWith('en') || v.lang.startsWith('en-US'))
      );
      
      if (enVoice) {
        utter.voice = enVoice;
        console.log('Voice dipilih:', enVoice.name);
      } else {
        console.log('Voice English tidak ditemukan, menggunakan default');
      }
    } else {
      console.log('Tidak ada voices tersedia, menggunakan default browser');
    }
    
    // Event handlers
    utter.onstart = () => {
      console.log('Speech started');
      statusDiv.classList.add('show');
    };
    
    utter.onend = () => {
      console.log('Speech ended');
      statusDiv.classList.remove('show');
    };
    
    utter.onerror = (e) => {
      console.error('Speech error:', e);
      statusDiv.classList.remove('show');
    };
    
    // Mainkan suara
    speechSynthesis.speak(utter);
    return true;
    
  } catch (error) {
    console.error('Error TTS:', error);
    return false;
  }
}

// Event listener tombol
btn.addEventListener('click', async () => {
  // Nonaktifkan tombol sementara
  btn.disabled = true;
  btn.textContent = '⏳ Memproses...';
  
  // Coba mainkan suara
  const speechSuccess = await playSpeech();
  
  // Tampilkan pesan fallback jika TTS gagal
  if (!speechSuccess) {
    fallbackDiv.textContent = '⚠️ Mode suara tidak tersedia, melanjutkan ke Google...';
  }
  
  // Redirect setelah delay (berjalan meski speech gagal)
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 1500); // 1.5 detik (lebih lama untuk Firefox)
});

// Pre-load voices saat halaman load (untuk Firefox)
if ('speechSynthesis' in window) {
  // Trigger load voices
  speechSynthesis.getVoices();
  
  // Firefox butuh ini untuk menginisialisasi
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => {
      console.log('Voices loaded:', speechSynthesis.getVoices().length);
    };
  }
}

console.log('Browser:', navigator.userAgent);
console.log('Speech support:', 'speechSynthesis' in window);
</script>

</body>
</html>
